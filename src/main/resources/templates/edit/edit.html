<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit task</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .edit-card {
      background: white;
      border-radius: 8px;
      padding: 2.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 2rem;
      text-align: center;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1.2rem;
    }

    label {
      font-size: 0.9rem;
      color: #444;
    }

    input[type="text"],
    select {
      padding: 0.5rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.95rem;
      width: 100%;
    }

    .btn-save {
      width: 100%;
      background: #f0c020;
      border: none;
      padding: 0.7rem;
      font-weight: bold;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      border-radius: 4px;
      margin-top: 0.5rem;
    }

    .btn-save:hover {
      background: #e0b010;
    }

    .btn-cancel {
      display: block;
      text-align: center;
      margin-top: 1rem;
      color: #888;
      font-size: 0.85rem;
      text-decoration: none;
    }

    .btn-cancel:hover {
      color: #444;
    }
  </style>
</head>
<body>
  <div class="edit-card">
    <h1>Edit Task</h1>
    <form th:action="@{/edit/{id}(id=${task.id})}" method="post">

      <div class="form-group">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" th:value="${task.title}" required>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <input type="text" id="description" name="description" th:value="${task.description}">
      </div>

      <div class="form-group">
        <label for="type">Type</label>
        <select id="type" name="type" required>
          <option value="work"     th:selected="${task.type == 'work'}">Work 🧳</option>
          <option value="shopping" th:selected="${task.type == 'shopping'}">Shopping 🛒</option>
          <option value="health"   th:selected="${task.type == 'health'}">Health 💊</option>
          <option value="personal" th:selected="${task.type == 'personal'}">Personal 👤</option>
          <option value="other"    th:selected="${task.type == 'other'}">Other ❓</option>
        </select>
      </div>

      <button type="submit" class="btn-save">Save</button>
    </form>
    <a th:href="@{/}" class="btn-cancel">← Back</a>
  </div>
</body>
</html>
