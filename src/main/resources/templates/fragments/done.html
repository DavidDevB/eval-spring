<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <div th:fragment="done">
    <h2>Completed tasks</h2>
    <ul class="task-list">
      <li th:each="task : ${completedTasks}">
        <span th:text="${task.title}"></span>
      </li>
      <li th:if="${#lists.isEmpty(completedTasks)}" class="empty">No completed tasks yet.</li>
    </ul>
  </div>
</body>
</html>
