<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <div th:fragment="tasks">
    <h2>Tasks</h2>
    <ul class="task-list">
      <li th:each="task : ${tasks}">
        <span th:text="${task.title}"></span>
        <span th:text="${task.description}"></span>
        <span th:switch="${task.type}" th:case="work">🧳</span>
        <span th:switch="${task.type}" th:case="shopping">🛒</span>
        <span th:switch="${task.type}" th:case="health" >💊</span>
        <span th:switch="${task.type}" th:case="personal">👤</span>
        <span th:switch="${task.type}" th:case="other">❓</span>
        <form th:action="@{/inProgress}" method="post" style="display:inline">
          <button type="submit" name="id" th:value="${task.id}" class="btn-done">Do</button>
        </form>
      </li>
      <li th:if="${#lists.isEmpty(tasks)}" class="empty">No pending tasks.</li>
    </ul>
  </div>
</body>
</html>
