<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <div th:fragment="form">
    <form th:action="@{/add}" method="post">
      <div class="form-column">
        <label>New task:</label>
        <input type="text" name="title" />
        <label>Description:</label>
        <textarea type="text" name="description"></textarea>
      </div>
      <div class="categories">
        <input type="radio" name="type" class="active" method="post" value="work" th:action="@{/add}">Work 🧳</input>
        <input type="radio" name="type" class="active" method="post" value="shopping" th:action="@{/add}">Shopping 🛒</input>
        <input type="radio" name="type" class="active" method="post" value="health" th:action="@{/add}">Health 💊</input>
        <input type="radio" name="type" class="active" method="post" value="personal" th:action="@{/add}">Personal 👤</input>
        <input type="radio" name="type" class="active" method="post" value="other" th:action="@{/add}">Other ❓</input>
      </div>
      <button type="submit" class="btn-add">Add Task</button>
    </form>
  </div>
</body>
</html>
