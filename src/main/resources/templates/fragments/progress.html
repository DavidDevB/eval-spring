<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <div th:fragment="inProgress">
    <h2>Tasks in progress</h2>
    <ul class="task-list">
      <li th:each="task : ${inProgressTasks}">
        <span th:text="${task.title}"></span>
        <form th:action="@{/complete}" method="post" style="display:inline">
          <button type="submit" name="id" th:value="${task.id}" class="btn-done">Done</button>
        </form>
      </li>
      
    </ul>
  </div>
</body>
</html>
