<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
layout:decorate="~{layout}">

<body>

  <div layout:fragment="done">
    <h2>Completed tasks ↺</h2>
    <ul>
      <li th:each="task : ${completedTasks}" th:text="${task.title}">Completed tasks</li>
      <li th:if="${#lists.isEmpty(completedTasks)}">No completed tasks yet.</li>
    </ul>
  </div>

</body>
</html>
