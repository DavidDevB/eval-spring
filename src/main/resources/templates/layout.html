<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
      
<head>
  <meta charset="UTF-8">
  <title>To do List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f0f0f0;
    }

    header {
  background: white;
  text-align: center;
  padding: 1.5rem;
  border-bottom: 2px solid #ddd;
  margin-bottom: 1rem;
}

    header h1 {
      font-size: 2.5rem;
      font-weight: 900;
    }

    main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-areas:
    "form       tasks"
    "inprogress done";
  gap: 2.5rem;
  padding: 3rem 4rem;
  max-width: 1200px;
  margin: 0 auto;
}

.card {
  background: white;
  border-radius: 8px;
  padding: 1.5rem;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}

    /* Formulaire */
 .form-column {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.form-column input {
  padding: 0.4rem 0.6rem;
  border: 1px solid #ccc;
  font-size: 0.95rem;
}

.form-column textarea {
  padding: 0.4rem 0.6rem;
  border: 1px solid #ccc;
  font-size: 0.95rem;
  height: 120px;
  resize: vertical; /* l'utilisateur peut redimensionner verticalement */
}

  .categories {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
  }

  .categories span {
    cursor: pointer;
    font-size: 0.9rem;
    color: #444;
  }

  .categories span.active {
    font-weight: bold;
    text-decoration: underline;
  }

  .btn-add {
    background: #f0c020;
    border: none;
    padding: 0.6rem 1.2rem;
    font-weight: bold;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    text-transform: uppercase;
  }

  /* Tasks */
  .panel-tasks h2,
  .panel-done h2 {
    text-align: center;
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 1rem;
    color: #222;
  }

  .task-list { list-style: none; }

  .task-list li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    border-bottom: 1px solid #eee;
    font-size: 0.9rem;
  }

  .btn-done {
    background: none;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 0.2rem 0.6rem;
    cursor: pointer;
    font-size: 0.8rem;
    color: #555;
  }

  .empty {
    color: #aaa;
    font-size: 0.85rem;
    text-align: center;
    margin-top: 1rem;
  }

  /* Done panel centré */
  .panel-done {
    width: 60%;
  }

  .login, .logout {
    display: inline-block;
    background: #f0c020;
    border: none;
    padding: 0.6rem 1.2rem;
    font-weight: bold;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    text-transform: uppercase;
    text-decoration: none;
    color: #111;
  }
  </style>
</head>
<body>

  <header>
    <h1>To do List</h1>
    <div>
      <a class="login" th:if="${user == null}" th:href="@{/login}">Login</a>
      <a class="logout" th:if="${user != null}" th:href="@{/logout}">Logout</a>
    </div>
  </header>

  <main>
    <div class="panel-form">
      <div layout:fragment="form"></div>
    </div>

    <div class="panel-tasks card">
      <div layout:fragment="tasks"></div>
    </div>

    <div class="panel-inProgress card">
      <div layout:fragment="inProgress"></div>
    </div>

    <div class="panel-done card">
      <div layout:fragment="done"></div>
    </div>
  </main>

</body>
</html>
